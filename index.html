<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusStep - タイマー修復完全版</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --timer-bg: #1e293b;
            --progress-fill: #10b981;
            --done-bg: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-weight: 800; }
        
        .timer-card {
            background: var(--timer-bg);
            color: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .timer-svg { width: 180px; height: 180px; transform: rotate(-90deg); }
        .timer-svg circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-progress {
            stroke: #38bdf8;
            stroke-dasharray: 502.65; 
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); }
        .timer-display { font-size: 2.2rem; font-weight: bold; font-family: monospace; }
        .timer-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        .timer-controls button {
            padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer;
            font-weight: bold; background: rgba(255,255,255,0.2); color: white;
            min-width: 80px;
        }

        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        h2 { font-size: 1rem; color: #64748b; margin-top: 20px; border-left: 4px solid var(--primary); padding-left: 10px; }
        .todo-list { list-style: none; padding: 0; margin: 0; }
        .todo-item {
            background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .todo-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .meter-container { display: flex; align-items: center; gap: 12px; }
        input[type="range"] { flex: 1; cursor: pointer; accent-color: var(--progress-fill); }
        .percent-text { font-size: 0.8rem; font-weight: bold; width: 40px; color: var(--primary); }
        #doneList .todo-item { background: var(--done-bg); opacity: 0.7; }
        .delete-btn { color: #cbd5e1; cursor: pointer; border: none; background: none; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>FocusStep</h1></header>

    <div class="timer-card">
        <svg class="timer-svg">
            <circle class="circle-bg" cx="90" cy="90" r="80"></circle>
            <circle id="progressCircle" class="circle-progress" cx="90" cy="90" r="80"></circle>
        </svg>
        <div class="timer-content">
            <div id="timerDisplay" class="timer-display">25:00</div>
        </div>
        <div class="timer-controls">
            <button id="startBtn">START</button>
            <button id="resetBtn">RESET</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="やることを入力...">
        <button class="add-btn" id="addBtn">追加</button>
    </div>

    <h2>実行中</h2>
    <ul id="todoList" class="todo-list"></ul>
    <h2>完了済み</h2>
    <ul id="doneList" class="todo-list"></ul>
</div>

<script>
    // --- 状態管理 ---
    const TOTAL_TIME = 25 * 60;
    let timeLeft = TOTAL_TIME;
    let timerInterval = null;
    const CIRCUMFERENCE = 502.65;
    
    const circle = document.getElementById('progressCircle');
    const timerDisplay = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');

    circle.style.strokeDasharray = CIRCUMFERENCE;
    circle.style.strokeDashoffset = 0;

    // --- タイマー機能 ---
    function updateTimerVisuals() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        const progress = timeLeft / TOTAL_TIME;
        const offset = CIRCUMFERENCE * (1 - progress);
        circle.style.strokeDashoffset = offset;
    }

    function toggleTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            startBtn.textContent = 'START';
        } else {
            startBtn.textContent = 'STOP';
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerVisuals();
                } else {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    startBtn.textContent = 'START';
                    alert('ポモドーロ終了！お疲れ様でした。');
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = TOTAL_TIME;
        startBtn.textContent = 'START';
        updateTimerVisuals();
    }

    // --- タスク管理機能 ---
    let tasks = JSON.parse(localStorage.getItem('focus_v_final')) || [];

    function renderTasks() {
        const todoList = document.getElementById('todoList');
        const doneList = document.getElementById('doneList');
        todoList.innerHTML = '';
        doneList.innerHTML = '';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <div class="todo-header">
                    <span class="todo-title">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
                </div>
                <div class="meter-container">
                    <input type="range" min="0" max="100" value="${task.progress}" 
                           oninput="updateProgress(${task.id}, this.value)">
                    <span class="percent-text">${task.progress}%</span>
                </div>
            `;
            if (task.progress >= 100) doneList.appendChild(li);
            else todoList.appendChild(li);
        });
        localStorage.setItem('focus_v_final', JSON.stringify(tasks));
    }

    window.addTask = function() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        tasks.unshift({ id: Date.now(), text: input.value, progress: 0 });
        input.value = '';
        renderTasks();
    };

    window.updateProgress = function(id, val) {
        tasks = tasks.map(t => t.id === id ? {...t, progress: parseInt(val)} : t);
        renderTasks();
    };

    window.deleteTask = function(id) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks();
    };

    // --- イベントリスナー ---
    document.getElementById('startBtn').addEventListener('click', toggleTimer);
    document.getElementById('resetBtn').addEventListener('click', resetTimer);
    document.getElementById('addBtn').addEventListener('click', addTask);
    document.getElementById('taskInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    // 初期化
    updateTimerVisuals();
    renderTasks();
</script>
</body>
</html>
