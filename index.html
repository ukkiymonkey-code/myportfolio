<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusStep - 進捗メーター付きタスク管理</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f43f5e;
            --timer-bg: #1e293b;
            --progress-fill: #10b981;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .subtitle { font-size: 0.85rem; color: #64748b; }

        /* --- タイマーセクション --- */
        .timer-card {
            background: var(--timer-bg);
            color: white;
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .timer-display { font-size: 2.2rem; font-weight: bold; margin: 10px 0; font-family: monospace; }
        .timer-controls button {
            background: rgba(255,255,255,0.15);
            color: white; border: none; padding: 8px 16px;
            border-radius: 12px; cursor: pointer; margin: 0 5px;
        }

        /* --- タスク入力 --- */
        .input-group {
            display: flex; gap: 8px; margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 2px solid #e2e8f0; outline: none;
        }
        .add-btn {
            background: var(--primary); color: white; border: none;
            padding: 0 15px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        /* --- タスクリスト & メーター --- */
        .todo-list { list-style: none; padding: 0; }
        .todo-item {
            background: white; padding: 18px; border-radius: 16px;
            margin-bottom: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .todo-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .todo-title { font-weight: 600; font-size: 1rem; }
        .todo-item.completed { background: #f1f5f9; opacity: 0.7; }
        .todo-item.completed .todo-title { text-decoration: line-through; color: #94a3b8; }

        /* メーターのデザイン */
        .meter-container {
            display: flex; align-items: center; gap: 10px;
        }
        input[type="range"] {
            flex: 1; cursor: pointer; accent-color: var(--progress-fill);
        }
        .percent-text {
            font-size: 0.8rem; font-weight: bold; width: 40px; color: var(--primary);
        }

        .delete-btn { color: #cbd5e1; cursor: pointer; border: none; background: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FocusStep</h1>
        <p class="subtitle">進捗を視覚化して達成感を得よう</p>
    </header>

    <div class="timer-card">
        <div id="timerDisplay" class="timer-display">25:00</div>
        <div class="timer-controls">
            <button id="startBtn" onclick="toggleTimer()">START</button>
            <button onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="今のタスクを入力..." onkeypress="if(event.key==='Enter') addTask()">
        <button class="add-btn" onclick="addTask()">追加</button>
    </div>

    <ul id="todoList" class="todo-list"></ul>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem('focus_tasks_v2')) || [];
    let timeLeft = 25 * 60;
    let timerInterval = null;

    // --- タスク管理 ---
    function renderTasks() {
        const list = document.getElementById('todoList');
        list.innerHTML = '';
        
        tasks.forEach((task, index) => {
            const isDone = task.progress >= 100;
            const li = document.createElement('li');
            li.className = `todo-item ${isDone ? 'completed' : ''}`;
            
            li.innerHTML = `
                <div class="todo-header">
                    <span class="todo-title">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
                </div>
                <div class="meter-container">
                    <input type="range" min="0" max="100" value="${task.progress}" 
                           oninput="updateProgress(${task.id}, this.value)">
                    <span class="percent-text">${task.progress}%</span>
                </div>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('focus_tasks_v2', JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        tasks.unshift({ id: Date.now(), text: input.value, progress: 0 });
        input.value = '';
        renderTasks();
    }

    function updateProgress(id, val) {
        tasks = tasks.map(t => t.id === id ? {...t, progress: parseInt(val)} : t);
        renderTasks(); // メーターを動かすたびに再描画して完了判定
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks();
    }

    // --- タイマー (簡易版) ---
    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.textContent = 'START';
        } else {
            btn.textContent = 'STOP';
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timerDisplay').textContent = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) { clearInterval(timerInterval); alert('時間です！'); resetTimer(); }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = 25 * 60;
        document.getElementById('timerDisplay').textContent = "25:00";
        document.getElementById('startBtn').textContent = 'START';
    }

    renderTasks();
</script>

</body>
</html>
