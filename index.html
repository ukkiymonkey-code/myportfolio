<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusStep - ポモドーロ＆進捗メーター</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f43f5e;
            --timer-bg: #1e293b;
            --progress-fill: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-weight: 800; }
        .subtitle { font-size: 0.85rem; color: #64748b; }

        /* --- 視覚的ポモドーロタイマー --- */
        .timer-card {
            background: var(--timer-bg);
            color: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        .timer-svg {
            width: 180px;
            height: 180px;
            transform: rotate(-90deg);
        }

        .timer-svg circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .circle-bg { stroke: rgba(255,255,255,0.1); }
        
        .circle-progress {
            stroke: #38bdf8;
            stroke-dasharray: 502; /* 2 * PI * r (r=80) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
        }

        .timer-display {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .timer-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        .timer-controls button {
            padding: 8px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.2s;
        }
        .timer-controls button:hover { background: rgba(255,255,255,0.25); }

        /* --- タスク入力 --- */
        .input-group {
            display: flex; gap: 8px; margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 2px solid #e2e8f0; outline: none; font-size: 1rem;
        }
        .add-btn {
            background: var(--primary); color: white; border: none;
            padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        /* --- タスクリスト & 進捗メーター --- */
        .todo-list { list-style: none; padding: 0; }
        .todo-item {
            background: white; padding: 18px; border-radius: 16px;
            margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .todo-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .todo-title { font-weight: 600; font-size: 1rem; color: var(--text); }
        .todo-item.completed { background: #f1f5f9; opacity: 0.7; }
        .todo-item.completed .todo-title { text-decoration: line-through; color: #94a3b8; }

        .meter-container {
            display: flex; align-items: center; gap: 12px;
        }
        input[type="range"] {
            flex: 1; cursor: pointer; accent-color: var(--progress-fill);
        }
        .percent-text {
            font-size: 0.85rem; font-weight: bold; width: 45px; color: var(--primary); text-align: right;
        }

        .delete-btn { color: #cbd5e1; cursor: pointer; border: none; background: none; font-size: 1.4rem; }
        .delete-btn:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FocusStep</h1>
        <p class="subtitle">視覚化でADHDの「時間管理」をサポート</p>
    </header>

    <div class="timer-card">
        <svg class="timer-svg">
            <circle class="circle-bg" cx="90" cy="90" r="80"></circle>
            <circle id="progressCircle" class="circle-progress" cx="90" cy="90" r="80"></circle>
        </svg>
        <div class="timer-content">
            <div id="timerDisplay" class="timer-display">25:00</div>
            <div style="font-size: 0.6rem; color: #94a3b8; letter-spacing: 1px;">FOCUS</div>
        </div>
        <div class="timer-controls">
            <button id="startBtn" onclick="toggleTimer()">START</button>
            <button onclick="resetTimer()">RESET</button>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="次にやることを1つ入力..." onkeypress="if(event.key==='Enter') addTask()">
        <button class="add-btn" onclick="addTask()">追加</button>
    </div>

    <ul id="todoList" class="todo-list"></ul>
</div>

<script>
    // --- タイマー変数 ---
    const TOTAL_TIME = 25 * 60;
    let timeLeft = TOTAL_TIME;
    let timerInterval = null;
    const CIRCUMFERENCE = 2 * Math.PI * 80;
    const circle = document.getElementById('progressCircle');
    circle.style.strokeDasharray = CIRCUMFERENCE;

    function updateTimerVisuals() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timerDisplay').textContent = 
            `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        const offset = CIRCUMFERENCE - (timeLeft / TOTAL_TIME) * CIRCUMFERENCE;
        circle.style.strokeDashoffset = offset;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
            btn.textContent = 'START';
        } else {
            btn.textContent = 'STOP';
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerVisuals();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    alert('お疲れ様です！休憩しましょう。');
                    resetTimer();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        timeLeft = TOTAL_TIME;
        document.getElementById('startBtn').textContent = 'START';
        updateTimerVisuals();
    }

    // --- タスク管理変数 ---
    let tasks = JSON.parse(localStorage.getItem('focus_master_db')) || [];

    function renderTasks() {
        const list = document.getElementById('todoList');
        list.innerHTML = '';
        
        tasks.forEach(task => {
            const isDone = task.progress >= 100;
            const li = document.createElement('li');
            li.className = `todo-item ${isDone ? 'completed' : ''}`;
            
            li.innerHTML = `
                <div class="todo-header">
                    <span class="todo-title">${task.text}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">&times;</button>
                </div>
                <div class="meter-container">
                    <input type="range" min="0" max="100" value="${task.progress}" 
                           oninput="updateProgress(${task.id}, this.value)">
                    <span class="percent-text">${task.progress}%</span>
                </div>
            `;
            list.appendChild(li);
        });
        localStorage.setItem('focus_master_db', JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;
        tasks.unshift({ id: Date.now(), text: input.value, progress: 0 });
        input.value = '';
        renderTasks();
    }

    function updateProgress(id, val) {
        tasks = tasks.map(t => t.id === id ? {...t, progress: parseInt(val)} : t);
        renderTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks();
    }

    // 初期起動
    updateTimerVisuals();
    renderTasks();
</script>

</body>
</html>
