<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FocusStep - Wisdom Edition</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --timer-bg: #1e293b; --done-bg: #e2e8f0; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #1e293b; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        
        /* 名言エリアの調整 */
        #quote { 
            font-size: 0.9rem; 
            color: #64748b; 
            font-style: italic; 
            margin-bottom: 25px; 
            min-height: 4.5em; 
            line-height: 1.6; 
            padding: 0 15px;
            /* 変な改行を防ぐ設定 */
            word-break: keep-all;
            overflow-wrap: anywhere;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #quote span.author {
            display: block;
            margin-top: 8px;
            font-weight: bold;
            font-style: normal;
            font-size: 0.8rem;
        }

        .timer-card { background: var(--timer-bg); color: white; padding: 30px; border-radius: 24px; position: relative; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .timer-svg { width: 160px; height: 160px; transform: rotate(-90deg); }
        circle { fill: none; stroke-width: 10; stroke-linecap: round; }
        .circle-bg { stroke: rgba(255,255,255,0.1); }
        .circle-progress { 
            stroke: #38bdf8; 
            stroke-dasharray: 471.2; 
            stroke-dashoffset: 0; 
            transition: stroke-dashoffset 1s linear; 
        }
        .timer-display { position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-family: monospace; }
        .controls { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .controls button { padding: 8px 16px; border-radius: 10px; border: none; cursor: pointer; background: rgba(255,255,255,0.2); color: white; font-weight: bold; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        
        h2 { font-size: 0.9rem; color: #64748b; text-align: left; border-left: 4px solid var(--primary); padding-left: 8px; margin: 20px 0 10px; }
        ul { list-style: none; padding: 0; }
        .todo-item { background: white; padding: 15px; border-radius: 16px; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #10b981; }
        #doneList .todo-item { background: var(--done-bg); opacity: 0.6; text-decoration: line-through; }
        .del-btn { color: #cbd5e1; border: none; background: none; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
<div class="container">
    <h1>FocusStep</h1>
    <div id="quote"></div>

    <div class="timer-card">
        <svg class="timer-svg"><circle class="circle-bg" cx="80" cy="80" r="75"></circle><circle id="progressCircle" class="circle-progress" cx="80" cy="80" r="75"></circle></svg>
        <div id="timerDisplay" class="timer-display">25:00</div>
        <div class="controls"><button id="startBtn">START</button><button id="resetBtn">RESET</button></div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="やることを入力...">
        <button class="add-btn" id="addBtn">追加</button>
    </div>

    <h2>実行中</h2>
    <ul id="todoList"></ul>
    <h2>完了済み</h2>
    <ul id="doneList"></ul>
</div>

<script>
    // --- 1. 名言ランダム表示（改行対応版） ---
    const wisdoms = [
        { q: "「私は失敗したことがない。ただ、1万通りの『うまく行かない方法』を見つけただけだ」", a: "トーマス・エジソン" },
        { q: "「空想は知識より重要である。知識には限界があるが、空想は世界を包み込む」", a: "アルベルト・アインシュタイン" },
        { q: "「現状維持は退歩の始まり。常に挑戦し続けなければならない」", a: "ウォルト・ディズニー" },
        { q: "「クレイジーな人たちがいる。……彼らは物事を変える。彼らは人類を前進させる」", a: "スティーブ・ジョブズ" },
        { q: "「成功とは、情熱を失わずに失敗を繰り返す能力のことだ」", a: "ウィンストン・チャーチル" }
    ];
    const picked = wisdoms[Math.floor(Math.random() * wisdoms.length)];
    document.getElementById('quote').innerHTML = `${picked.q}<span class="author">${picked.a}</span>`;

    // --- 2. タイマー（時計回り版） ---
    const SET_TIME = 25 * 60;
    let time = SET_TIME;
    let timer = null;
    const circle = document.getElementById('progressCircle');
    const len = 2 * Math.PI * 75; 
    circle.style.strokeDasharray = len;

    function draw() {
        const m = Math.floor(time / 60);
        const s = time % 60;
        document.getElementById('timerDisplay').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        circle.style.strokeDashoffset = len * (1 - time / SET_TIME);
    }

    document.getElementById('startBtn').onclick = function() {
        if (timer) { clearInterval(timer); timer = null; this.innerText = 'START'; }
        else { this.innerText = 'STOP'; timer = setInterval(() => { if (time > 0) { time--; draw(); } else { clearInterval(timer); alert('Time up!'); } }, 1000); }
    };
    document.getElementById('resetBtn').onclick = () => { clearInterval(timer); timer = null; time = SET_TIME; draw(); document.getElementById('startBtn').innerText = 'START'; };

    // --- 3. タスク管理 ---
    let data = JSON.parse(localStorage.getItem('fstep_v9')) || [];
    function render() {
        const tArea = document.getElementById('todoList');
        const dArea = document.getElementById('doneList');
        tArea.innerHTML = ''; dArea.innerHTML = '';
        data.forEach(item => {
            const li = document.createElement('li');
            li.className = 'todo-item';
            li.innerHTML = `
                <div class="item-header"><span>${item.txt}</span><button class="del-btn" onclick="del(${item.id})">&times;</button></div>
                <input type="range" value="${item.p}" onchange="upd(${item.id}, this.value)">
                <div style="font-size:0.7rem; color:gray; text-align:right;">${item.p}%</div>
            `;
            if (item.p >= 100) dArea.appendChild(li); else tArea.appendChild(li);
        });
        localStorage.setItem('fstep_v9', JSON.stringify(data));
    }

    window.upd = (id, val) => { data = data.map(d => d.id === id ? {...d, p: parseInt(val)} : d); render(); };
    window.del = (id) => { data = data.filter(d => d.id !== id); render(); };
    document.getElementById('addBtn').onclick = () => {
        const i = document.getElementById('taskInput');
        if (!i.value) return;
        data.unshift({ id: Date.now(), txt: i.value, p: 0 });
        i.value = ''; render();
    };

    draw(); render();
</script>
</body>
</html>
