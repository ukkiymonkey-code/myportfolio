<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusStep - ポモドーロ＆進捗メーター</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --accent: #f43f5e;
            --timer-bg: #1e293b;
            --progress-fill: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 500px; }
        
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-weight: 800; }
        .subtitle { font-size: 0.85rem; color: #64748b; }

        /* --- 視覚的ポモドーロタイマー --- */
        .timer-card {
            background: var(--timer-bg);
            color: white;
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
        }

        .timer-svg {
            width: 180px;
            height: 180px;
            transform: rotate(-90deg);
        }

        .timer-svg circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .circle-bg { stroke: rgba(255,255,255,0.1); }
        
        .circle-progress {
            stroke: #38bdf8;
            stroke-dasharray: 502; /* 2 * PI * r (r=80) */
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
        }

        .timer-display {
            font-size: 2.2rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .timer-controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
        .timer-controls button {
            padding: 8px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.2s;
        }
        .timer-controls button:hover { background: rgba(255,255,255,0.25); }

        /* --- タスク入力 --- */
        .input-group {
            display: flex; gap: 8px; margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 2px solid #e2e8f0; outline: none; font-size: 1rem;
        }
        .add-btn {
            background: var(--primary); color: white; border: none;
            padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold;
        }

        /* --- タスクリスト & 進捗メーター --- */
        .todo-list { list-style: none; padding: 0; }
        .todo-item {
            background: white; padding: 18px; border-radius: 16px;
            margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .todo-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }

        .todo-title { font-weight: 600; font-size: 1rem; color: var(--text); }
        .todo-item.completed { background: #f1f5f9; opacity: 0.7; }
